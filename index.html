    <style>

        .container { max-width:900px; margin:0 auto; }
        
        /* Header with Admin Button */
        header { 
            background:white; 
            padding:20px 30px;

            margin-bottom:20px; 
            display: flex; 
            justify-content: space-between;

        .form-group input, .form-group select { padding:12px; border:2px solid #e0e0e0; border-radius:8px; font-size:14px; }
        .submit-btn { width:100%; padding:15px; background:linear-gradient(135deg,#667eea,#764ba2); color:white; border:none; border-radius:8px; font-size:16px; cursor:pointer; font-weight:600; }

        .admin-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }

        .error { background:#fee2e2; color:#b91c1c; border: 1px solid #ef4444; }

async function loadMapData() {

data.forEach(rec => {

if (baseLat && baseLng) {

function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;

    const a =
        Math.sin(dLat / 2) ** 2 +
        Math.cos(lat1 * Math.PI / 180) *
        Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLon / 2) ** 2;

    return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}
